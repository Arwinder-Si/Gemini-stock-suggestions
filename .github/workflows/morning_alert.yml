name: Morning Pre-Market Alert

on:
  schedule:
    # 8:30 AM IST = 3:00 AM UTC (Mon-Fri)
    - cron: '0 3 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  morning-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download latest trade plan
        uses: actions/download-artifact@v4
        with:
          name: screener-results-${{ github.run_number }}
          path: .
        continue-on-error: true

      - name: Run Global Market Intelligence
        run: python global_signals.py

      - name: Send Morning Webex Notification
        env:
          WEBEX_TOKEN: ${{ secrets.WEBEX_TOKEN }}
          WEBEX_ROOM_ID: ${{ secrets.WEBEX_ROOM_ID }}
        run: python notify_webex.py morning

      - name: Commit Database changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add market_data.db || true
          git commit -m "Auto-update market_data.db [skip ci]" || echo "No changes to commit"
          git push

