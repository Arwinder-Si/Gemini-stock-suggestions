# ============================================================
# Morning Alert — Runs Mon-Fri at 9:00 AM IST (3:30 UTC)
# ============================================================
# Sends the pre-market trade plan reminder to Webex

name: Morning Pre-Market Alert

on:
  schedule:
    # 9:00 AM IST = 3:30 AM UTC (Mon-Fri)
    - cron: '30 3 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

jobs:
  morning-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Download latest trade plan
        uses: actions/download-artifact@v4
        with:
          name: screener-results-${{ github.run_number }}
          path: .
        continue-on-error: true

      - name: Send Morning Webex Notification
        env:
          WEBEX_TOKEN: ${{ secrets.WEBEX_TOKEN }}
          WEBEX_ROOM_ID: ${{ secrets.WEBEX_ROOM_ID }}
        run: python notify_webex.py morning
